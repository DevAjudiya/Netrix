# ─────────────────────────────────────────
# Netrix — Alembic Configuration
# ─────────────────────────────────────────
# Alembic reads the database URL from the NETRIX_DATABASE_URL
# environment variable at runtime.  The placeholder below is
# overridden in migrations/env.py.
# ─────────────────────────────────────────

[alembic]
script_location = migrations
sqlalchemy.url = mysql+pymysql://%(MYSQL_USER)s:%(MYSQL_PASSWORD)s@%(MYSQL_HOST)s:%(MYSQL_PORT)s/%(MYSQL_DATABASE)s?charset=utf8mb4

# Uncomment the line below if you are running async migrations
# sqlalchemy.url = mysql+aiomysql://...

prepend_sys_path = .
version_path_separator = os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S
